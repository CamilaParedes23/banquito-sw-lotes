syntax = "proto3";

package banquito.switchpagos.batch.v1;

option java_multiple_files = true;
option java_package = "com.banquito.switchpagos.batch.grpc";
option java_outer_classname = "BatchGatewayProto";

service BatchGatewayService {
  rpc UploadBatch(UploadBatchGrpcRequest) returns (UploadBatchGrpcResponse);
  rpc GetBatchStatus(BatchIdGrpcRequest) returns (BatchStatusGrpcResponse);
  rpc GetBatchValidationErrors(BatchIdGrpcRequest) returns (BatchValidationErrorsGrpcResponse);
  rpc GetBatchLines(BatchIdGrpcRequest) returns (BatchLinesGrpcResponse);
}

message UploadBatchGrpcRequest {
  string file_name = 1;
  string content_type = 2;
  bytes content = 3;
  string channel = 4;
  string received_by = 5;
}

message UploadBatchGrpcResponse {
  string batch_id = 1;
  string status = 2;
  string message = 3;
  string received_at = 4;
  string correlation_id = 5;
}

message BatchIdGrpcRequest {
  string batch_id = 1;
}

message BatchStatusGrpcResponse {
  string batch_id = 1;
  string status = 2;
  string company_ruc = 3;
  string source_account_number = 4;
  string service_type = 5;
  string file_name = 6;
  int32 total_records = 7;
  string control_amount = 8;
  string received_at = 9;
  string validated_at = 10;
  string funded_at = 11;
  string core_funding_id = 12;
  string core_transaction_id = 13;
  string accounting_date = 14;
  string message = 15;
}

message BatchValidationErrorsGrpcResponse {
  string batch_id = 1;
  repeated ValidationErrorGrpc errors = 2;
}

message ValidationErrorGrpc {
  string code = 1;
  string message = 2;
  string field = 3;
}

message BatchLinesGrpcResponse {
  string batch_id = 1;
  repeated BatchLineGrpc lines = 2;
}

message BatchLineGrpc {
  string line_id = 1;
  int32 sequence_number = 2;
  string beneficiary_identification = 3;
  string beneficiary_name = 4;
  string destination_account_number = 5;
  string routing_code = 6;
  string amount = 7;
  string status = 8;
  string event_id = 9;
}
